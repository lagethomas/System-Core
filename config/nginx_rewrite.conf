# Configuração de Rewrite para Nginx - SaaSFlow MVC
# Coloque estas regras dentro do seu bloco 'server' ou na seção de Rewrite do painel.

location / {
    # Tenta servir o arquivo ou diretório real, caso contrário manda pro index.php
    try_files $uri $uri/ /index.php?$query_string;
}

# Impede o acesso a arquivos sensíveis fora da pasta public (se o docroot for a raiz do projeto)
# Se o docroot já for a pasta /public, estas regras não são estritamente necessárias mas recomendadas.
location ~ ^/(src|config|includes|routes|logs)/ {
    deny all;
    return 404;
}
